# Codemagic CI/CD for gem-crush-game
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "16.0"
        APP_NAME: "gem-crush-game"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/gem-crush-game.git --depth 1
      - cd gem-crush-game && git submodule update --init --recursive
      - cd gem-crush-game && xcode-project fetch-dependencies --use-cache
      - cd gem-crush-game && xcode-project build --workspace ios/GemCrush.xcworkspace --scheme GemCrush --configuration Release
    artifacts:
      - gem-crush-game/ios/*.ipa
    publishing:
      app_store_connect:
        api_key: Whitefoxes
